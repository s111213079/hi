<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Babylon Viewer Select</title>

    <style>
        .viewerContainer {
            width: 400px;
            height: 500px;
            image-rendering: pixelated;
        }
    </style>

    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <script>
        function loadit(modelUrl) {
            if (modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                if (viewer) {
                    viewer.loadModel({ url: modelUrl });
                } else {
                    console.log("viewer 尚未初始化");
                }
            }
        }
    </script>
</head>

<body>

<select onchange="loadit(this.value)">
    <option value="">select model</option>
    <option value="./models/test2.0.glb">test2.0</option>
    <option value="./models/Astronaut.glb">Astronaut</option>
    <option value="./models/stacy_lightweight.glb">Stacy</option>
</select>

<div class="viewerContainer">
    <babylon id="viewerID" model="./models/test2.0.glb"></babylon>
</div>

</body>
</html>
